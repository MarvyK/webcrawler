<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Crawler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <!-- <link rel="stylesheet" href="css/styles.css" /> -->
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0a;
        --surface: #111111;
        --surface2: #1a1a1a;
        --border: #2a2a2a;
        --border2: #333;
        --green: #00e676;
        --green-dim: #00e67620;
        --green-mid: #00e67640;
        --amber: #ffab40;
        --red: #ff5252;
        --muted: #555;
        --text: #e0e0e0;
        --text-dim: #888;
        --mono: 'IBM Plex Mono', monospace;
        --sans: 'IBM Plex Sans', sans-serif;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
        padding: 0;
      }

      /* ── Header ── */
      header {
        padding: 24px 32px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: baseline;
        gap: 16px;
      }
      header h1 {
        font-family: var(--mono);
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.05em;
        color: var(--green);
      }
      header h1::before {
        content: '> ';
        color: var(--muted);
      }
      .tagline {
        font-size: 12px;
        color: var(--muted);
        font-family: var(--mono);
      }

      /* ── Layout ── */
      main {
        display: grid;
        grid-template-columns: 360px 1fr;
        height: 100%;
        overflow: hidden;
      }

      /* ── Sidebar ── */
      aside {
        border-right: 1px solid var(--border);
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        overflow-y: auto;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      label {
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        font-family: var(--mono);
      }

      input[type='text'],
      input[type='number'] {
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 4px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 13px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }
      input:focus {
        border-color: var(--green);
      }
      input::placeholder {
        color: var(--muted);
      }

      input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 2px;
        background: var(--border2);
        border-radius: 2px;
        outline: none;
        margin-top: 4px;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: var(--green);
        border-radius: 50%;
        cursor: pointer;
      }
      .range-labels {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
        margin-top: 4px;
      }

      .btn-crawl {
        background: var(--green);
        color: #000;
        border: none;
        border-radius: 4px;
        padding: 12px 20px;
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition:
          opacity 0.15s,
          transform 0.1s;
        width: 100%;
      }
      .btn-crawl:hover {
        opacity: 0.9;
      }
      .btn-crawl:active {
        transform: scale(0.98);
      }
      .btn-crawl:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .btn-stop {
        background: transparent;
        color: var(--red);
        border: 1px solid var(--red);
        border-radius: 4px;
        padding: 10px 20px;
        font-family: var(--mono);
        font-size: 13px;
        cursor: pointer;
        width: 100%;
        display: none;
        transition: background 0.15s;
      }
      .btn-stop:hover {
        background: #ff525210;
      }

      /* Stats */
      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .stat-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 12px;
      }
      .stat-card .val {
        font-family: var(--mono);
        font-size: 20px;
        font-weight: 600;
        color: var(--green);
        line-height: 1;
      }
      .stat-card .lbl {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: 4px;
      }

      /* Progress bar */
      .progress-wrap {
        display: none;
        flex-direction: column;
        gap: 6px;
      }
      .progress-bar-bg {
        height: 2px;
        background: var(--border2);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: var(--green);
        width: 0%;
        transition: width 0.3s;
        border-radius: 2px;
      }
      .progress-label {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
      }

      /* ── Results panel ── */
      section {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .results-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .results-title {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .results-title span {
        color: var(--green);
      }

      .actions {
        display: flex;
        gap: 8px;
      }
      .btn-action {
        background: transparent;
        border: 1px solid var(--border2);
        color: var(--text-dim);
        border-radius: 4px;
        padding: 6px 12px;
        font-family: var(--mono);
        font-size: 11px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s;
        letter-spacing: 0.04em;
      }
      .btn-action:hover {
        border-color: var(--green);
        color: var(--green);
      }
      .btn-action:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* Filter */
      .filter-bar {
        padding: 10px 20px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .filter-bar input {
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--border2);
        border-radius: 0;
        color: var(--text-dim);
        font-size: 12px;
        padding: 4px 0;
        width: 100%;
      }
      .filter-bar input:focus {
        border-bottom-color: var(--green);
        color: var(--text);
      }

      /* URL list */
      #url-list {
        flex: 1;
        overflow-y: auto;
        font-family: var(--mono);
        font-size: 12px;
      }
      #url-list::-webkit-scrollbar {
        width: 4px;
      }
      #url-list::-webkit-scrollbar-track {
        background: transparent;
      }
      #url-list::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }

      .url-row {
        display: grid;
        grid-template-columns: 28px 48px 1fr 60px;
        align-items: center;
        gap: 8px;
        padding: 7px 20px;
        border-bottom: 1px solid var(--border);
        animation: fadeIn 0.2s ease;
        transition: background 0.1s;
      }
      .url-row:hover {
        background: var(--surface2);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(-4px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .depth-badge {
        font-size: 10px;
        color: var(--muted);
        text-align: center;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        justify-self: center;
      }
      .status-dot.error {
        background: var(--red);
      }
      .url-text {
        color: var(--text-dim);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
      }
      .url-text:hover {
        color: var(--green);
      }
      .status-code {
        font-size: 10px;
        color: var(--muted);
        text-align: right;
      }
      .status-code.ok {
        color: var(--green);
      }
      .status-code.err {
        color: var(--red);
      }

      /* Empty / done states */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 13px;
      }
      .empty-state .icon {
        font-size: 32px;
        opacity: 0.3;
      }

      /* Log strip at bottom */
      .log-strip {
        padding: 8px 20px;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        height: 32px;
        overflow: hidden;
        flex-shrink: 0;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .log-strip .cursor {
        display: inline-block;
        width: 7px;
        height: 12px;
        background: var(--green);
        vertical-align: middle;
        margin-left: 2px;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      /* Copied toast */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--green);
        color: #000;
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 4px;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.2s,
          transform 0.2s;
        pointer-events: none;
        z-index: 999;
      }
      .toast.show {
        opacity: 1;
        transform: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>webcrawler</h1>
      <span class="tagline">// URL discovery tool</span>
    </header>

    <main>
      <aside>
        <div class="field">
          <label>Target URL</label>
          <input type="text" id="url-input" placeholder="https://example.com" />
        </div>

        <div class="field">
          <label>Max depth — <span id="depth-val" style="color: var(--green); font-family: var(--mono)">3</span></label>
          <input type="range" id="depth-range" min="1" max="6" value="3" oninput="document.getElementById('depth-val').textContent = this.value" />
          <div class="range-labels"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span></div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="val" id="s-found">0</div>
            <div class="lbl">URLs found</div>
          </div>
          <div class="stat-card">
            <div class="val" id="s-crawled">0</div>
            <div class="lbl">Crawled</div>
          </div>
          <div class="stat-card">
            <div class="val" id="s-depth">—</div>
            <div class="lbl">Cur depth</div>
          </div>
          <div class="stat-card">
            <div class="val" id="s-queued">0</div>
            <div class="lbl">Queued</div>
          </div>
        </div>

        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
          <div class="progress-label" id="progress-label">Initialising…</div>
        </div>

        <button class="btn-crawl" id="btn-crawl" onclick="startCrawl()">START CRAWL</button>
        <button class="btn-stop" id="btn-stop" onclick="stopCrawl()">STOP</button>
      </aside>

      <section>
        <div class="results-header">
          <div class="results-title">results — <span id="count-label">0</span> urls</div>
          <div class="actions">
            <button class="btn-action" id="btn-copy" onclick="copyAll()" disabled>copy all</button>
            <button class="btn-action" id="btn-csv" onclick="downloadCSV()" disabled>export csv</button>
            <button class="btn-action" onclick="clearResults()">clear</button>
          </div>
        </div>
        <div class="filter-bar">
          <input type="text" id="filter-input" placeholder="filter urls…" oninput="filterUrls()" />
        </div>
        <div id="url-list">
          <div class="empty-state" id="empty-state">
            <div class="icon">◎</div>
            <div>enter a url and start crawling</div>
          </div>
        </div>
        <div class="log-strip" id="log-strip">ready<span class="cursor"></span></div>
      </section>
    </main>

    <div class="toast" id="toast">copied to clipboard</div>

    <script>
      let allUrls = [];
      let evtSource = null;
      let crawling = false;

      function startCrawl() {
        const url = document.getElementById('url-input').value.trim();
        const depth = parseInt(document.getElementById('depth-range').value);
        if (!url) {
          log('⚠ enter a target url');
          return;
        }

        allUrls = [];
        document.getElementById('url-list').innerHTML = '';
        document.getElementById('empty-state') && document.getElementById('empty-state').remove();
        updateStats(0, 0, '—', 0);
        document.getElementById('count-label').textContent = '0';
        document.getElementById('btn-copy').disabled = true;
        document.getElementById('btn-csv').disabled = true;
        document.getElementById('btn-crawl').disabled = true;
        document.getElementById('btn-stop').style.display = 'block';
        document.getElementById('progress-wrap').style.display = 'flex';
        crawling = true;

        fetch('/crawl', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, depth }),
        })
          .then((res) => {
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buf = '';

            function read() {
              reader.read().then(({ done, value }) => {
                if (done) {
                  onDone();
                  return;
                }
                buf += decoder.decode(value, { stream: true });
                const parts = buf.split('\n\n');
                buf = parts.pop();
                for (const part of parts) {
                  const line = part.replace(/^data: /, '').trim();
                  if (!line) continue;
                  try {
                    handleEvent(JSON.parse(line));
                  } catch {}
                }
                if (crawling) read();
              });
            }
            read();
          })
          .catch((err) => {
            log('✗ could not connect to server — is server.js running?');
            resetUI();
          });
      }

      function handleEvent(e) {
        if (e.type === 'crawling') {
          log(`crawling: ${e.url}`);
          updateStats(allUrls.length, e.crawled, e.depth, e.queued);
          document.getElementById('progress-label').textContent = `depth ${e.depth} / queued ${e.queued}`;
        } else if (e.type === 'found') {
          allUrls.push({ url: e.url, status: e.status, depth: e.depth });
          addRow(e.url, e.status, e.depth);
          updateStats(allUrls.length, e.crawled, e.depth, e.queued);
          document.getElementById('count-label').textContent = allUrls.length;
        } else if (e.type === 'error') {
          log(`✗ ${e.url} — ${e.error}`);
        } else if (e.type === 'done') {
          onDone();
        }
      }

      function addRow(url, status, depth) {
        const list = document.getElementById('url-list');
        const filter = document.getElementById('filter-input').value.toLowerCase();
        const row = document.createElement('div');
        row.className = 'url-row';
        row.dataset.url = url;
        const isOk = status >= 200 && status < 300;
        row.innerHTML = `
    <div class="depth-badge">d${depth}</div>
    <div class="status-dot ${isOk ? '' : 'error'}"></div>
    <div class="url-text" title="${url}" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}');toast('url copied')">${url}</div>
    <div class="status-code ${isOk ? 'ok' : 'err'}">${status}</div>
  `;
        if (filter && !url.toLowerCase().includes(filter)) row.style.display = 'none';
        list.appendChild(row);
        list.scrollTop = list.scrollHeight;
      }

      function onDone() {
        crawling = false;
        log(`✓ done — ${allUrls.length} urls found`);
        resetUI();
        if (allUrls.length > 0) {
          document.getElementById('btn-copy').disabled = false;
          document.getElementById('btn-csv').disabled = false;
        }
        document.getElementById('progress-label').textContent = `complete — ${allUrls.length} urls found`;
      }

      function stopCrawl() {
        crawling = false;
        log('stopped by user');
        resetUI();
      }

      function resetUI() {
        document.getElementById('btn-crawl').disabled = false;
        document.getElementById('btn-stop').style.display = 'none';
      }

      function updateStats(found, crawled, depth, queued) {
        document.getElementById('s-found').textContent = found;
        document.getElementById('s-crawled').textContent = crawled;
        document.getElementById('s-depth').textContent = depth;
        document.getElementById('s-queued').textContent = queued;
      }

      function filterUrls() {
        const f = document.getElementById('filter-input').value.toLowerCase();
        document.querySelectorAll('.url-row').forEach((row) => {
          row.style.display = !f || row.dataset.url.includes(f) ? '' : 'none';
        });
      }

      function copyAll() {
        const text = allUrls.map((u) => u.url).join('\n');
        navigator.clipboard.writeText(text).then(() => toast(`${allUrls.length} urls copied`));
      }

      function downloadCSV() {
        const csv = 'URL,Status,Depth\n' + allUrls.map((u) => `${u.url},${u.status},${u.depth}`).join('\n');
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = 'crawled-urls.csv';
        a.click();
      }

      function clearResults() {
        allUrls = [];
        document.getElementById('url-list').innerHTML = '<div class="empty-state" id="empty-state"><div class="icon">◎</div><div>enter a url and start crawling</div></div>';
        document.getElementById('count-label').textContent = '0';
        document.getElementById('btn-copy').disabled = true;
        document.getElementById('btn-csv').disabled = true;
        updateStats(0, 0, '—', 0);
        document.getElementById('progress-wrap').style.display = 'none';
        log('cleared');
      }

      function log(msg) {
        const el = document.getElementById('log-strip');
        el.innerHTML = `${msg}<span class="cursor"></span>`;
      }

      function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
      }
    </script>
  </body>
</html>
